# A2Z Core CI — enforces the Phase 1 exit criteria (CLAUDE.md §13/§15):
# ruff + mypy --strict clean, full suite green, core/ coverage >= 90%.
#
# Core's own suite runs in-process on moto + fakeredis (see tests/conftest.py)
# -- no service container needed. Omni-Channel's Postgres data-layer tests
# (tests/integration/omnichannel/) are the one exception: there is no
# in-process Postgres emulator equivalent to moto, so the `test` job runs a
# real `postgres` service container (app/services/omnichannel/CLAUDE.md §12).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check app tests scripts
      - run: ruff format --check app tests scripts
      - run: mypy app scripts

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: a2z
          POSTGRES_PASSWORD: a2z-local-dev-only
          POSTGRES_DB: a2z
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U a2z -d a2z"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://a2z:a2z-local-dev-only@localhost:5432/a2z
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - name: unit + integration (coverage gate 90%)
        run: pytest -m "not load" --cov=app/core --cov-report=term-missing --cov-fail-under=90 -q
      - name: load / latency targets (Design §5.4)
        # Latency assertions are jittery on shared runners; advisory for now.
        continue-on-error: true
        run: pytest -m load -q

  docker:
    runs-on: ubuntu-latest
    needs: lint-type
    steps:
      - uses: actions/checkout@v4
      - name: build monolith image
        run: docker build -t a2z-core:ci .

  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive infra/
      - name: validate each module (no backend/creds needed)
        run: |
          set -euo pipefail
          for mod in infra/modules/*/; do
            echo "== $mod"
            terraform -chdir="$mod" init -backend=false -input=false > /dev/null
            terraform -chdir="$mod" validate
          done
