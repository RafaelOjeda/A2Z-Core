# Alembic configuration for the Invoicing service (shared Postgres instance, invoicing schema).

[alembic]
# path to migration scripts
sqlalchemy.url = driver://user:password@localhost/dbname
script_location = migrations

# template_location =
# sqlalchemy.url_cli =

# Logging configuration
# path to the Logging configuration file, as described in the Python logging module documentation.
# file_name = logging.ini

# Logging level
# level = INFO

[loggers]
keys = sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
